<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Form Validation</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-4">

                <form name="myform" onsubmit=" runMe(); return false">

                    <div class="mb-2">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" class="form-control form-control-sm" id="username" name="u_name">
                    </div>
                    <div class="mb-2">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control form-control-sm" id="password" name="u_password">
                    </div>
                    <div class="mb-2">
                        <input type="submit" class="btn btn-sm btn-success" name="u-login">
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        var u_name = document.myform.u_name;
        var u_password = document.myform.u_password;

        function runMe() {
            if (u_name.value == "") {
                u_name.classList.add('is-invalid');
            } else if (u_name.value) {
                u_name.classList.remove('is-invalid');
                u_name.classList.add('is-valid');
            }

            if (u_password.value == "") {
                u_password.classList.add('is-invalid');
            } else if (u_password.value) {
                u_password.classList.remove('is-invalid');
                u_password.classList.add('is-valid');
            }

        }
    </script>
</body>

</html>
