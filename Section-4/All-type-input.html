<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>All Types of Input</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <form class="container mt-4">
                    <div class="mb-3">
                        <label for="fullName" class="form-label">Full Name</label>
                        <input type="text" class="form-control" id="fullName" placeholder="John Doe">
                    </div>

                    <div class="form-floating mb-3">
                        <input type="email" class="form-control" id="floatingEmail" placeholder="name@example.com">
                        <label for="floatingEmail">Email address</label>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Large Username</label>
                        <input type="text" class="form-control form-control-lg" placeholder=".form-control-lg">
                    </div>

                    <div class="mb-3">
                        <label for="countrySelect" class="form-label">Select Country</label>
                        <select class="form-select" id="countrySelect">
                            <option selected>Choose...</option>
                            <option value="1">USA</option>
                            <option value="2">UK</option>
                        </select>
                    </div>

                    <div class="mb-3">
                        <div class="form-check">
                            <input class="form-check-input" type="checkbox" id="check1">
                            <label class="form-check-label" for="check1">Default checkbox</label>
                        </div>
                        <div class="form-check form-switch">
                            <input class="form-check-input" type="checkbox" id="switch1">
                            <label class="form-check-label" for="switch1">Toggle Switch</label>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="formFile" class="form-label">Upload Profile Picture</label>
                        <input class="form-control" type="file" id="formFile">
                    </div>

                    <div class="mb-3">
                        <label for="volumeRange" class="form-label">Volume Level</label>
                        <input type="range" class="form-range" id="volumeRange">
                    </div>

                    <div class="mb-3">
                        <label for="colorInput" class="form-label">Theme Color</label>
                        <input type="color" class="form-control form-control-color" id="colorInput" value="#0d6efd">
                    </div>

                    <button type="submit" class="btn btn-primary">Submit Form</button>
                </form>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
