    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flexbox</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">

<body>
    <div class="container mt-3">
        <div class="row justify-content-center mb-3 mt-5">
            <div class="col-md-8">
            <div class="d-flex p-2">Flexbox Container</div>
            <div class="d-inline-flex p-2">Inline Flexbox Container</div>
            </div>
        </div>
    </div>

    <div class="container mt-3">
        <div class="row justify-content-center mb-3 mt-5">
            <div class="col-md-8">
            <div class="d-sm-flex p-2">Flexbox Container</div>
            <div class="d-sm-inline-flex p-2">Inline Flexbox Container</div>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
