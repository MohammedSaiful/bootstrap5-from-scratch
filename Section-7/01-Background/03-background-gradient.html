<body>
  <div class="container mt-3">
        <div class="row justify-content-center mb-3 mt-5">
            <div class="col-md-8">
                <div class="p-3 m-2 bg-primary bg-gradient text-white">Something to display</div>
                <div class="p-3 m-2 bg-secondary bg-gradient text-white">Something to display</div>

        </div>
    </div>
