<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Toasts translucent</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
 <style>
        .top-spacing{
            margin-top: 20%;
        }
    </style>
</head>
<body class="bg-dark">

<div class="container mt-3">
    <div class="row justify-content-center mb-3">
        <div class="col-md-8">

            <button
                type="button"
                class="btn btn-primary"
                id="liveToastBtn">
                Show live toast
            </button>

            <div 
                class="toast position-fixed bottom-0 end-0 me-2 mb-2"
                role="alert"
                aria-live="assertive"
                aria-atomic="true"
                id="liveToast">
                <div class="toast-header">
                    <img 
                        class="rounded me-2" 
                        style="width: 15px; height: 15px;" 
                        src="https://primeinspire.com/wp-content/uploads/2025/05/cropped-cropped-Prime-Inspire-Logo-01.png" 
                        alt="">
                    <strong class="me-auto">Bootstrap</strong>
                    <small class="text-muted">10 min ago</small>
                    <button
                        type="button"
                        class="btn-close"
                        data-bs-dismiss="toast"
                        aria-label="Close">
                    </button>
                </div>
                <div class="toast-body">
                    Hello, World! this is toast message
                </div>
            </div>

        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="enable-stuff.js"></script>

    <script>
        const toastTrigger = document.getElementById('liveToastBtn');
        const toastLiveExample = document.getElementById('liveToast');

        if (toastTrigger) {
            toastTrigger.addEventListener('click', () => {
                const toast = new bootstrap.Toast(toastLiveExample);
                toast.show();
            });
        }
    </script>
</body>

</html>
