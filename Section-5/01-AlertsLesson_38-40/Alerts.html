<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alerts</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <style>
        .h-10 {
            height: 10rem;
        }
    </style>
</head>

<body>
    <div class="container mt-3">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="alert alert-primary">
                    Lorem ipsum, dolor sit <a href="#" class="alert-link">click here</a> adipisicing elit. Commodi, ex.

                </div>

                <div class="alert alert-primary mb-3">
                    <h4>Well done!</h4>
                    <hr>
                    <p>Lorem ipsum, dolor sit adipisicing elit. Commodi, ex.</p>
                </div>
                <div class="alert alert-primary mb-3">
                    
                    <p><i class="bi bi-info-circle-fill me-3"></i>Lorem ipsum, dolor sit adipisicing elit. Commodi, ex.</p>
                </div>
            </div>
        </div>

        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
