<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Progress Bar </title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
<style>
        .top-spacing{
            margin-top: 20%;
        }
    </style>
</head>
<body>
    <div class="container mt-3">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Progress Bar 27% Custom Style and Value-->
            <div class="progress mb-3" style="height: 1px;">
                <div
                    class="progress-bar"
                    role="progressbar"
                    aria-valuenow="27"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    style="width: 27%;">
                </div>
            </div>
            <!-- Progress Bar 27% Custom Style and Value-->
            <div class="progress mb-3" style="height: 20px;">
                <div
                    class="progress-bar"
                    role="progressbar"
                    aria-valuenow="27"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    style="width: 27%;">
                </div>
            </div>
            <!-- Progress Bar 27% Custom Style and Value-->
            <div class="progress bg-light mb-3">
                <div
                    class="progress-bar"
                    role="progressbar"
                    aria-valuenow="27"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    style="width: 27%;">
                </div>
            </div>
            <!-- Progress Bar 27% Custom Style and Value-->
            <div class="progress bg-light mb-3">
                <div
                    class="progress-bar bg-dark"
                    role="progressbar"
                    aria-valuenow="27"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    style="width: 27%;">
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="enable-stuff.js"></script>
</body>

</html>
