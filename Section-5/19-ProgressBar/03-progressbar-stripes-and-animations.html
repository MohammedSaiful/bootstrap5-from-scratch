<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Popover</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
 <style>
        .top-spacing{
            margin-top: 20%;
        }
        .custom-popover{
            --bs-popover-max-width: 200px;
            --bs-popover-border-color: var(--bs-primary);
            --bs-popover-header-bg: var(--bs-primary);
            --bs-popover-header-color: var(--bs-white);
            --bs-popover-body-padding-x: 1rem;
            --bs-popover-body-padding-y: .5rem;

        }
    </style>
</head>
<body>
    <div class="container mt-3">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <!-- Progress Bar 50% Value-->
            <div class="progress mb-3">
                <div
                    class="progress-bar bg-dark progress-bar-striped w-50"
                    role="progressbar"
                    aria-valuenow="50"
                    aria-valuemin="0"
                    aria-valuemax="100">
                </div>
            </div>
            <!-- Progress Bar 50% Value Animated-->
            <div class="progress mb-3">
                <div
                    class="progress-bar bg-dark progress-bar-striped progress-bar-animated w-50"
                    role="progressbar"
                    aria-valuenow="50"
                    aria-valuemin="0"
                    aria-valuemax="100">
                </div>
            </div>
        </div>
    </div>
</div>

    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="enable-stuff.js"></script>
</body>

</html>
